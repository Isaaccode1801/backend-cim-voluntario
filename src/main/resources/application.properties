# A URL do Transaction Pooler IPv4 que funciona perfeitamente nestas plataformas gratuitas:
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Ajustes para PgBouncer (Supabase IPv4 Pooler)
spring.datasource.hikari.connection-init-sql=SET search_path TO public
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false